[unix_http_server]
file=/var/run/supervisor.sock
chmod=0777 ; so pi user can use it without sudo

[inet_http_server]
port=*:9001

[supervisord]
logfile=/home/pi/supervisord.log
pidfile=/var/run/supervisord.pid

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[program:app]
command=/home/pi/env/bin/python /home/pi/runapp.py
autorestart=true

[program:shutdown]
command=/sbin/shutdown -P now
autostart=false
autorestart=false
startsecs=0
user=root

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface